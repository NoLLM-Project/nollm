<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoLLM UI</title>

  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div id="app">

    <!-- ------------------------------------------------------------
         SURFACES UI (sidebar + chat window + input bar + menu)
         ------------------------------------------------------------ -->
    <div id="surfaces-ui">

      <!-- MENU -->
      <div id="menu" class="menu-bar">
        <button id="menu-reset-user" class="menu-btn">Reset User</button>
        <button id="menu-new-conversation" class="menu-btn">New Conversation</button>
        <button id="menu-clear-history" class="menu-btn">Clear History</button>
      </div>

      <!-- MAIN SURFACES LAYOUT -->
      <div style="display: flex; gap: 12px;">

        <!-- SIDEBAR -->
        <div class="sidebar">

          <!-- Collapse / Expand Toggle -->
          <button id="sidebar-toggle" class="sidebar-toggle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>

          <!-- Sidebar Header Bar -->
          <div class="sidebar-header">
            Conversations
          </div>

          <!-- New Conversation Button -->
          <button class="sidebar-new-convo" data-label="New Conversation">
            <span class="sidebar-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </span>
            New Conversation
          </button>

          <!-- Conversation List -->
          <div class="sidebar-list">

            <div class="sidebar-item selected" data-label="Conversation 1">
              <span class="sidebar-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </span>
              Conversation 1
            </div>

            <div class="sidebar-item" data-label="Conversation 2">
              <span class="sidebar-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </span>
              Conversation 2
            </div>

            <div class="sidebar-item" data-label="Conversation 3">
              <span class="sidebar-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </span>
              Conversation 3
            </div>

          </div>

          <!-- Settings -->
          <div class="sidebar-settings">

            <div class="sidebar-setting-item" data-label="Settings">
              <span class="sidebar-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </span>
              Settings
            </div>

            <div class="sidebar-setting-item" data-label="About">
              <span class="sidebar-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="16" x2="12" y2="12"/>
                  <line x1="12" y1="8" x2="12" y2="8"/>
                </svg>
              </span>
              About
            </div>

          </div>

          <!-- Sidebar Footer -->
          <div class="sidebar-footer" data-label="Footer">
            <span class="sidebar-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
              </svg>
            </span>
            Footer
          </div>

        </div>

        <!-- CHAT COLUMN -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 12px;">

          <div id="chat-window" class="chat-window"></div>

          <div id="chat-input-bar" class="chat-input-bar">
            <input id="chat-input" class="chat-input" type="text"
                   placeholder="Type a message..." autocomplete="off" />
            <button id="chat-send" class="chat-send">Send</button>
          </div>

        </div>

      </div>
    </div>

    <!-- SYSTEM ERROR PANEL -->
    <div id="system-error-panel" style="color: red; padding: 10px;"></div>

    <!-- SYSTEM PANELS -->
    <div id="input-panel"></div>
    <div id="workflow-panel"></div>
    <div id="carrier-panel"></div>
    <div id="output-panel"></div>

  </div>

  <script type="module" src="/surfaces/ui/ui.js"></script>

  <!-- Sidebar collapse/expand toggle -->
  <script>
    document.getElementById("sidebar-toggle").addEventListener("click", () => {
      document.querySelector(".sidebar").classList.toggle("collapsed");
    });

    // Forward "New Conversation" button to existing menu action
    document.querySelector(".sidebar-new-convo").addEventListener("click", () => {
      document.getElementById("menu-new-conversation").click();
    });
  </script>

</body>
</html>
